<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>APS geometry dump</title>
  <link rel="stylesheet"
        href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css" />
  <style>html, body { margin: 0; height: 100%; } #viewer { position: absolute; inset: 0; }</style>
</head>
<body>
  <div id="viewer"></div>
  <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js"></script>
  <script>
    (function patchGetContext() {
      const orig = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function (type, attrs) {
        if (typeof type === "string" && type.indexOf("webgl") >= 0) {
          attrs = Object.assign({}, attrs || {}, { failIfMajorPerformanceCaveat: false });
        }
        return orig.call(this, type, attrs);
      };
    })();

    window.__DUMP__ = { status: "init", format: "svf2", views: [], error: null, meta: {} };

    const URN = new URLSearchParams(location.search).get("urn");
    const TOKEN = new URLSearchParams(location.search).get("token");
    const FORMAT = (new URLSearchParams(location.search).get("format") || "svf2").toLowerCase();
    const MAX_VIEWS = parseInt(new URLSearchParams(location.search).get("maxViews") || "1", 10);
    const VIEW_NAMES = (new URLSearchParams(location.search).get("viewNames") || "")
      .split(",")
      .map((s) => s.trim())
      .filter(Boolean);

    function fail(msg) {
      window.__DUMP__.status = "error";
      window.__DUMP__.error = String(msg);
      console.error("[DUMP]", msg);
    }
    function phase(p) { window.__DUMP__.status = p; console.log("[DUMP]", p); }

    function viewerOptions() {
      if (FORMAT === "svf1" || FORMAT === "svf") {
        return { env: "AutodeskProduction", api: "derivativeV2", getAccessToken: (cb) => cb(TOKEN, 3600) };
      }
      return { env: "AutodeskProduction2", api: "streamingV2", getAccessToken: (cb) => cb(TOKEN, 3600) };
    }

    function pickViewables(root) {
      let v = root.search({ type: "geometry", role: "2d" }) || [];
      if (!v.length) v = root.search({ type: "geometry" }) || [];
      if (VIEW_NAMES.length) {
        const byName = {};
        for (const node of v) {
          const name = (node.data && node.data.name) || "";
          if (name) byName[name] = node;
        }
        const preferred = [];
        for (const name of VIEW_NAMES) {
          if (byName[name]) preferred.push(byName[name]);
        }
        for (const node of v) {
          if (!preferred.includes(node)) preferred.push(node);
        }
        v = preferred;
      }
      return v.slice(0, MAX_VIEWS);
    }

    function dumpViewGeometry(viewer, viewName) {
      const model = viewer.model;
      const fragList = model.getFragmentList();
      const frags = fragList.fragments;
      const fragCount = frags.length || 0;
      const use2d = !!(viewer.impl && viewer.impl.use2dInstancing);
      const VBR = Autodesk.Viewing.Private.VertexBufferReader;
      const tree = model.getInstanceTree();
      const byDbId = {};
      let totalSegs = 0;

      function ensureDb(dbId) {
        if (!byDbId[dbId]) byDbId[dbId] = { dbId, layer: "", name: "", primitives: [] };
        return byDbId[dbId];
      }

      function makeCb(entry) {
        return {
          onLineSegment(x0, y0, x1, y1) {
            entry.primitives.push({ type: "line", x1: x0, y1: y0, x2: x1, y2: y1 });
            totalSegs++;
          },
          onCircularArc(cx, cy, start, end, radius) {
            entry.primitives.push({ type: "arc", cx, cy, start, end, radius });
          },
          onEllipticalArc(cx, cy, start, end, major) {
            entry.primitives.push({ type: "arc", cx, cy, start, end, radius: major });
          },
          onOneTriangle(v1, v2, v3) {
            entry.primitives.push({ type: "quad", points: [[v1.x, v1.y], [v2.x, v2.y], [v3.x, v3.y]] });
          },
          onTexQuad() {},
        };
      }

      let meshesWithGeometry = 0;
      for (let fragId = 0; fragId < fragCount; fragId++) {
        const dbId = frags.fragId2dbId[fragId];
        let mesh = null;
        try { mesh = fragList.getVizmesh(fragId); } catch (e) {}
        if (!mesh || !mesh.geometry) {
          try { mesh = viewer.impl.getRenderProxy(model, fragId); } catch (e) {}
        }
        if (!mesh || !mesh.geometry) continue;
        meshesWithGeometry++;
        const vbr = new VBR(mesh.geometry, use2d);
        const entry = ensureDb(dbId);
        const cb = makeCb(entry);
        const n0 = entry.primitives.length;
        try { vbr.enumGeomsForObject(dbId, cb); } catch (e) {}
        if (entry.primitives.length === n0) {
          try { vbr.enumMeshGeomsForRenderProxy(mesh, cb); } catch (e) {}
        }
        if (entry.primitives.length === n0) {
          try { vbr.enumMeshGeoms(cb); } catch (e) {}
        }
      }

      if (totalSegs === 0 && tree) {
        tree.enumNodeChildren(tree.getRootId(), (dbId) => {
          tree.enumNodeFragments(dbId, (fragId) => {
            let mesh = null;
            try { mesh = fragList.getVizmesh(fragId); } catch (e) {}
            if (!mesh || !mesh.geometry) return;
            meshesWithGeometry++;
            const vbr = new VBR(mesh.geometry, use2d);
            const entry = ensureDb(dbId);
            try { vbr.enumGeomsForObject(dbId, makeCb(entry)); } catch (e) {}
          }, true);
        }, true);
      }

      const objects = Object.values(byDbId).filter((o) => o.primitives.length > 0);
      const meta = {
        viewName, fragmentCount: fragCount, meshesWithGeometry,
        objectCount: objects.length, segmentCount: totalSegs, use2dInstancing: use2d,
        hasTree: !!tree,
      };
      try {
        const bb = model.getBoundingBox();
        meta.modelBBox = [bb.min.x, bb.min.y, bb.min.z, bb.max.x, bb.max.y, bb.max.z];
      } catch (e) {}
      console.log("[DUMP] meta", JSON.stringify(meta));
      return { name: viewName, objects, meta };
    }

    function resolveLayers(viewer, viewDump, cb) {
      const model = viewer.model;
      const tree = model.getInstanceTree();
      if (!tree || !viewDump.objects.length) return cb();
      const dbIds = viewDump.objects.map((o) => o.dbId);
      model.getBulkProperties(dbIds, { propFilter: ["Layer"] }, (results) => {
        const own = {};
        for (const r of results) {
          for (const p of r.properties || []) {
            if ((p.displayName || "").toLowerCase() === "layer") own[r.dbId] = p.displayValue;
          }
        }
        const resolve = (dbId) => {
          let cur = dbId, g = 0;
          while (cur && g++ < 64) {
            if (own[cur]) return own[cur];
            cur = tree.getNodeParentId(cur);
          }
          return "";
        };
        for (const obj of viewDump.objects) obj.layer = resolve(obj.dbId);
        cb();
      }, () => cb());
    }

    function loadViewable(viewer, doc, viewables, index) {
      if (index >= viewables.length) {
        window.__DUMP__.status = "done";
        return;
      }
      const node = viewables[index];
      const viewName = (node.data && node.data.name) || ("view_" + index);
      phase("loading_" + viewName);

      viewer.loadDocumentNode(doc, node).then(() => {
        const model = viewer.model;
        const waitDone = () => new Promise((resolve) => {
          if (model && model.isLoadDone && model.isLoadDone()) return resolve();
          const onProgress = (ev) => {
            if (model.isLoadDone && model.isLoadDone()) {
              viewer.removeEventListener(Autodesk.Viewing.PROGRESS_UPDATE_EVENT, onProgress);
              resolve();
            }
          };
          viewer.addEventListener(Autodesk.Viewing.PROGRESS_UPDATE_EVENT, onProgress);
          setTimeout(resolve, 15000);
        });
        waitDone().then(() => {
          setTimeout(() => {
            try {
              const viewDump = dumpViewGeometry(viewer, viewName);
              resolveLayers(viewer, viewDump, () => {
                window.__DUMP__.views.push(viewDump);
                loadViewable(viewer, doc, viewables, index + 1);
              });
            } catch (e) {
              fail(e.stack || e);
            }
          }, 2000);
        });
      }).catch((e) => fail("loadDocumentNode " + e));
    }

    function startViewer() {
      window.__DUMP__.format = FORMAT;
      phase("initializing");
      Autodesk.Viewing.Initializer(viewerOptions(), () => {
        const viewer = new Autodesk.Viewing.Viewer3D(document.getElementById("viewer"));
        if (viewer.start() > 0) return fail("viewer.start failed");
        window.__viewer = viewer;
        Autodesk.Viewing.Document.load("urn:" + URN, (doc) => {
          const viewables = pickViewables(doc.getRoot());
          if (!viewables.length) return fail("sin viewables");
          window.__DUMP__.meta.viewableCount = viewables.length;
          loadViewable(viewer, doc, viewables, 0);
        }, (c, m) => fail("Document.load " + c + " " + m));
      });
    }

    if (!URN || !TOKEN) fail("faltan urn/token"); else startViewer();
  </script>
</body>
</html>
