<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dupla Clash Viewer</title>
    <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css" />
    <link rel="stylesheet" href="/static/aps_viewer/viewer.css" />
  </head>
  <body>
    <aside id="clashSidebar" class="sidebar"></aside>
    <main class="viewer-shell">
      <div id="debugPanel" class="debug-panel"></div>
      <section id="calibrationPanel" class="calibration-panel" hidden>
        <h2>Calibración de coordenadas</h2>
        <label>coordinate_space<select id="calCoordinateSpace"><option value="world">world</option><option value="model">model</option></select></label>
        <label>scale<input id="calScale" type="number" step="0.0001"></label>
        <label>offset_x<input id="calOffsetX" type="number" step="1"></label>
        <label>offset_y<input id="calOffsetY" type="number" step="1"></label>
        <label>offset_z<input id="calOffsetZ" type="number" step="1"></label>
        <label>rotation_degrees<input id="calRotation" type="number" step="0.1"></label>
        <label>unit_factor<input id="calUnitFactor" type="number" step="0.0001"></label>
        <label class="check"><input id="calInvertY" type="checkbox">invert_y</label>
        <div class="cal-actions">
          <button id="calApply">Aplicar</button>
          <button id="calSave">Guardar configuración</button>
          <button id="calReset">Reset</button>
          <button id="calToggleSpace">Alternar world/model</button>
        </div>
        <div class="cal-actions">
          <button id="calCentroids">Mostrar centroides</button>
          <button id="calLabels">Mostrar labels</button>
          <button id="calRaw">Mostrar bbox raw</button>
          <button id="calTransformed">Mostrar bbox transformado</button>
        </div>
        <pre id="calReadout"></pre>
      </section>
      <div id="viewer"></div>
      <svg id="demoViewer" class="demo-viewer" viewBox="0 0 5200 4200" hidden></svg>
    </main>
    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js"></script>
    <script src="/static/aps_viewer/apiClient.js"></script>
    <script src="/static/aps_viewer/ClashBoxesExtension.js"></script>
    <script src="/static/aps_viewer/ClashSidebar.js"></script>
    <script src="/static/aps_viewer/viewer.js"></script>
  </body>
</html>
