# Postgres de compose montando el volumen Docker que ya tiene la data.
#
# En la otra máquina:
#   docker volume ls | grep dupla_pg
#   # o, si conoces el contenedor viejo:
#   docker inspect dupla-postgres-1 --format '{{range .Mounts}}{{.Name}}{{println}}{{end}}'
#
# Proyecto "dupla" → contenedor dupla-postgres-1 → volumen dupla_dupla_pg
# Proyecto "dupla-no-docker" → volumen dupla-no-docker_dupla_pg
#
#   1. Ajusta `name:` abajo al volumen real
#   2. docker stop dupla-postgres-1   # no dos Postgres en el mismo volumen
#   3. docker compose -f docker-compose.yml -f docker-compose.existing-volume.yml up --build
services:
  postgres:
    volumes:
      - dupla_pg:/var/lib/postgresql/data

volumes:
  dupla_pg:
    external: true
    name: dupla_dupla_pg
